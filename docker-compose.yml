services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app/app
      - ./demo:/app/demo
      - atlas-data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/repoatlas.db
      - CORS_ORIGINS=http://localhost:3000,http://127.0.0.1:3000
    working_dir: /app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend

volumes:
  atlas-data:
